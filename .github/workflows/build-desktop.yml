name: Build and Package Noir Client Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-desktop:
    name: Noir Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install latest CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build build-essential libgl1-mesa-dev libxkbcommon-x11-dev libglib2.0-dev libfontconfig1-dev libdbus-1-dev libxcb-cursor0 libicu-dev

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 6.10.0 (Desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          target: desktop
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2022_64' || runner.os == 'macOS' && 'clang_64' || '' }}
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build project
        run: cmake --build build --config Release --parallel

      - name: Deploy Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -p deploy
          Copy-Item -Path build/client/NoirMessenger.exe -Destination deploy/ -Force
          windeployqt --release --no-compiler-runtime --qmldir client/qml --dir deploy deploy/NoirMessenger.exe

      - name: Deploy macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p deploy
          echo "=== Checking where macOS binary is located ==="
          ls -la build/ || true
          ls -la build/client/ || true

          # Если CMake всё же собрал бандл .app (на будущее):
          if [ -d "build/client/NoirMessenger.app" ]; then
            macdeployqt build/client/NoirMessenger.app -qmldir=client/qml -always-overwrite -verbose=1
            cp -R build/client/NoirMessenger.app deploy/
          # Иначе забираем обычный скомпилированный бинарник:
          elif [ -f "build/client/NoirMessenger" ]; then
            cp build/client/NoirMessenger deploy/NoirMessenger
            echo "Found plain binary on macOS, deploying without macdeployqt"
          elif [ -f "build/NoirMessenger" ]; then
            cp build/NoirMessenger deploy/NoirMessenger
            echo "Found plain binary in root build folder"
          else
            echo "ERROR: NoirMessenger not found on macOS!"
            exit 1
          fi

      - name: Prepare Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p deploy
          if [ -f "build/NoirMessenger" ]; then
            cp build/NoirMessenger deploy/NoirMessenger
          elif [ -f "build/client/NoirMessenger" ]; then
            cp build/client/NoirMessenger deploy/NoirMessenger
          fi

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noir-messenger-desktop-${{ matrix.os }}
          path: deploy/
