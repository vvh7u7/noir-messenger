name: Build and Package Noir Messenger

on:
  push:
    branches: [ "main" ]
    paths:
      - 'client/**'
      - 'libs/**'
      - 'CMakeLists.txt'
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'client/**'
      - 'libs/**'
      - 'CMakeLists.txt'

jobs:
  build-desktop:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install latest CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build build-essential libgl1-mesa-dev libxkbcommon-x11-dev libglib2.0-dev libfontconfig1-dev libdbus-1-dev libxcb-cursor0 libicu-dev

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 6.10.0 (Desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          target: desktop
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2022_64' || runner.os == 'macOS' && 'clang_64' || '' }}
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build project
        run: cmake --build build --config Release --parallel

      - name: Deploy Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -p deploy
          Copy-Item -Path build/client/NoirMessenger.exe -Destination deploy/ -Force
          windeployqt --release --no-compiler-runtime --qmldir client/qml --dir deploy deploy/NoirMessenger.exe

      - name: Deploy macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p deploy
          if [ -d "build/client/NoirMessenger.app" ]; then
            macdeployqt build/client/NoirMessenger.app -qmldir=client/qml -always-overwrite -verbose=1
            cp -R build/client/NoirMessenger.app deploy/
          else
            echo "ERROR: NoirMessenger.app not found!"
            exit 1
          fi

      - name: Prepare Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p deploy
          if [ -f "build/client/NoirMessenger" ]; then
            cp build/NoirMessenger deploy/NoirMessenger
          elif [ -f "build/client/NoirMessenger" ]; then
            cp build/client/NoirMessenger deploy/NoirMessenger
          fi

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noir-messenger-desktop-${{ matrix.os }}
          path: deploy/

  build-android:
    name: Android Multi-ABI APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.1.10909125'

      - name: Install latest CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: Install Qt 6.10.0 (Android)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          target: android
          arch: android
          cache: true

      - name: Configure CMake for Android
        run: |
          cmake -S . -B build_android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI="arm64-v8a;x86_64" \
            -DANDROID_PLATFORM=android-26 \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON

      - name: Build Android Project
        run: cmake --build build_android --target NoirMessenger --parallel

      - name: Build APK (androiddeployqt)
        run: cmake --build build_android --target NoirMessenger_make_apk

      - name: Find and Prepare APK
        run: |
          mkdir -p deploy_android
          find build_android/ -name "*.apk" -exec cp {} deploy_android/ \;

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noir-messenger-android-apk
          path: deploy_android/
          if-no-files-found: error