name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Android Multi-ABI APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.1.10909125'

      - name: Install latest CMake
        uses: lukka/get-cmake@latest

      - name: Install Qt 6.7.3 via Host Override
        run: |
          MIRROR_IP=$(dig +short mirrors.ocf.berkeley.edu | tail -n1)
          if [ -z "$MIRROR_IP" ]; then
            MIRROR_IP=$(nslookup mirrors.ocf.berkeley.edu | awk '/^Address: / { print $2 }' | tail -n1)
          fi
          
          echo "$MIRROR_IP download.qt.io" | sudo tee -a /etc/hosts
          echo "$MIRROR_IP mirrors.qt.io" | sudo tee -a /etc/hosts
          
          pip install aqtinstall
          python3 -m aqt install-qt linux android 6.7.3 android \
            --outputdir /home/runner/work/noir-messenger/Qt
          
          echo "Qt6_DIR=/home/runner/work/noir-messenger/Qt/6.7.3/android_arm64_v8a" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=/home/runner/work/noir-messenger/Qt/6.7.3/android_arm64_v8a" >> $GITHUB_ENV
          echo "/home/runner/work/noir-messenger/Qt/6.7.3/android_arm64_v8a/bin" >> $GITHUB_PATH

      - name: Configure CMake for Android
        run: |
          cmake -S . -B build_android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI="arm64-v8a" \
            -DANDROID_PLATFORM=android-26 \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON

      - name: Build Android Project
        run: cmake --build build_android --target NoirMessenger --parallel

      - name: Build APK (androiddeployqt)
        run: cmake --build build_android --target NoirMessenger_make_apk

      - name: Find and Prepare APK
        run: |
          mkdir -p deploy_android
          find build_android/ -name "*.apk" -exec cp {} deploy_android/ \;

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noir-messenger-android-apk
          path: deploy_android/
          if-no-files-found: error