name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    name: Android Multi-ABI APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.1.10909125'

      - name: Install latest CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: Check available Qt versions
        run: |
          pip install aqtinstall
          python3 -m aqt list-qt linux android

      - name: Configure CMake for Android
        run: |
          cmake -S . -B build_android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI="arm64-v8a;x86_64" \
            -DANDROID_PLATFORM=android-26 \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON

      - name: Build Android Project
        run: cmake --build build_android --target NoirMessenger --parallel

      - name: Build APK (androiddeployqt)
        run: cmake --build build_android --target NoirMessenger_make_apk

      - name: Find and Prepare APK
        run: |
          mkdir -p deploy_android
          find build_android/ -name "*.apk" -exec cp {} deploy_android/ \;

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: noir-messenger-android-apk
          path: deploy_android/
          if-no-files-found: error